<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשימת תיוג - מערכות</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #0a1628;
  color: #e8edf5;
  min-height: 100vh;
  direction: rtl;
  text-align: right;
}

/* TOP BAR */
.header {
  background: #0d1f3c;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  border-bottom: 2px solid #1e3a5f;
  position: sticky;
  top: 0;
  z-index: 100;
}

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* HOME SCREEN */
.home-screen { padding: 20px; }

.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  max-width: 500px;
  margin: 0 auto;
}

.tile {
  border-radius: 16px;
  padding: 20px 14px;
  cursor: pointer;
  text-align: center;
  color: #fff;
  font-weight: 600;
  transition: transform 0.15s;
}
.tile:active { transform: scale(0.96); }
.tile .icon {
  margin-bottom: 10px;
  display: flex;
  justify-content: center;
  height: 70px;
  font-size: 52px;
}

/* Tile colors */
.tile-blue    { background: linear-gradient(135deg,#3a6bd1,#1e3f8a); }
.tile-orange  { background: linear-gradient(135deg,#d17a3a,#8a4f1e); }
.tile-green   { background: linear-gradient(135deg,#3ad16b,#1e8a3f); }
.tile-brown   { background: linear-gradient(135deg,#8a6b3a,#5a3f1e); }
.tile-purple  { background: linear-gradient(135deg,#7a3ad1,#4f1e8a); }
.tile-red     { background: linear-gradient(135deg,#d13a3a,#8a1e1e); }

/* 3D RCS shelter icon */
.shelter {
  width: 60px;
  height: 36px;
  background: #3a6b3a;
  border: 3px solid #2e552e;
  border-radius: 6px;
  position: relative;
}
.shelter:after {
  content: "";
  position: absolute;
  width: 18px;
  height: 30px;
  background: #2e552e;
  left: -9px;
  top: 3px;
  transform: skewY(12deg);
  border-radius: 3px;
}

/* Footer on home screen */
.footer-bar {
  margin-top: 26px;
  background: #ffffff;
  padding: 14px 0;
  border-radius: 12px 12px 0 0;
  text-align: center;
}
.footer-text {
  color: #1a4fa3;
  font-size: 15px;
  font-weight: 700;
}

/* CHECKLIST HEADER */
.checklist-header {
  background: #0d1f3c;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid #1e3a5f;
  flex-direction: row-reverse;
}
.back-btn {
  width: 40px;
  height: 40px;
  background: #f5d742;
  border-radius: 10px;
  border: 3px solid #d4b400;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  color: #2b2b2b;
}
.reset-btn {
  width: 40px;
  height: 40px;
  background: #f0a000;
  border-radius: 10px;
  border: 3px solid #d48800;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  cursor: pointer;
  color: #2b2b2b;
}
.clear-crew-btn {
  width: 40px;
  height: 40px;
  background: #4aa3df;
  border-radius: 10px;
  border: 3px solid #2b7cad;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
  color: #0a1628;
}
.clear-crew-btn:active {
  transform: scale(0.95);
}
.auto-assign-btn {
  width: 40px;
  height: 40px;
  background: #7bd35a;
  border-radius: 10px;
  border: 3px solid #4c9b34;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  cursor: pointer;
  color: #0a1628;
}
.auto-assign-btn:active {
  transform: scale(0.95);
}
.checklist-title-wrap { flex: 1; }
.checklist-title { font-size: 18px; font-weight: 700; }
.checklist-sub { font-size: 12px; color: #e8edf5; }

/* Progress */
.progress-wrap {
  background: #0d1f3c;
  padding: 10px 20px 14px;
  border-bottom: 1px solid #1e3a5f;
}
.progress-bar-bg {
  background: #1e3a5f;
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg,#2e7d52,#4caf82);
  border-radius: 10px;
  transition: width 0.3s;
}
.progress-text {
  font-size: 11px;
  color: #7eb8f7;
  margin-top: 6px;
  text-align: right;
}

/* CREW */
.crew-wrap {
  background: #0f2240;
  border-bottom: 1px solid #1e3a5f;
}
.crew-header {
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  cursor: pointer;
  font-size: 14px;
  color: #7eb8f7;
  direction: rtl;
  text-align: right;
  flex-direction: row-reverse;
}
.crew-body {
  padding: 10px 20px 14px;
  display: none;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}
.crew-body.show { display: flex; }
.crew-row label { margin-left: 4px; }
.crew-row input {
  background: #0a1628;
  border: 1px solid #2a4d7f;
  border-radius: 6px;
  padding: 4px 6px;
  color: #e8edf5;
}

/* Captain button */
.captain-container {
  margin-right: auto;
}
.captain-btn {
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid #2a4d7f;
  background: #1e3a5f;
  color: #e8edf5;
  font-size: 13px;
  cursor: pointer;
  user-select: none;
}
.captain-btn.captain-active {
  background: #f5d742;
  color: #2b2b2b;
  border-color: #f5d742;
  box-shadow: 0 0 6px rgba(245,215,66,0.7);
}

/* Steps */
.steps-list {
  padding: 14px 16px 100px;
}
.step-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  background: #0f2240;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
}
.step-item.checked {
  background: #0a2918;
  border-color: #1a5c3a;
  opacity: 0.75;
}

/* Number badge */
.step-number {
  font-size: 17px;
  font-weight: 700;
  color: #0a1628;
  background: #bcd0e8;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 2px;
}

/* Checkbox */
.step-checkbox {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  border: 2px solid #2a4d7f;
  background: #0a1628;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* Text */
.step-text {
  font-size: 16px;
  line-height: 1.5;
  flex: 1;
  white-space: normal;
}

/* Assigned-to */
.assign-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
}
.assign-input {
  width: 40px;
  background: #0a1628;
  border: 1px solid #2a4d7f;
  border-radius: 6px;
  padding: 2px 4px;
  font-size: 12px;
  text-transform: uppercase;
  color: #e8edf5;
  text-align: center;
}

.assigned-highlight {
  box-shadow: 0 0 0 2px #4caf82;
}

/* Complete badge */
.complete-badge {
  display: none;
  background: linear-gradient(135deg,#2e7d52,#1a5c3a);
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  color: #fff;
  font-weight: 600;
}
.complete-badge.show { display: block; }

/* Captain-only banner */
.captain-banner {
  background: #f5d742;
  color: #2b2b2b;
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 12px;
  font-weight: 700;
  font-size: 15px;
}

/* Separator line */
.separator-line {
  border-top: 2px solid #d1b300;
  margin: 14px 0;
  opacity: 0.8;
}

/* Yellow label inside steps */
.yl {
  background: #f5d742;
  color: #2b2b2b;
  padding: 2px 4px;
  border-radius: 4px;
  font-weight: 700;
}
</style>
</head>
<body>

/* PERSISTENCE */
function saveState() {
  localStorage.setItem('ops_checked', JSON.stringify(checked));
  localStorage.setItem('ops_crew', JSON.stringify(crew));
  localStorage.setItem('ops_captain', captainMode ? '1' : '0');
}

function loadState() {
  const sChecked = localStorage.getItem('ops_checked');
  const sCrew = localStorage.getItem('ops_crew');
  const sCaptain = localStorage.getItem('ops_captain');

  if (sChecked) checked = JSON.parse(sChecked);
  if (sCrew) crew = JSON.parse(sCrew);
  if (sCaptain === '1') captainMode = true;

  initCrewInputs();
  initCaptainButton();
}

/* NAVIGATION */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function applyHeaderColor() {
  const hdr = document.getElementById('checklist-header');
  if (currentColor && headerGradients[currentColor]) {
    hdr.style.background = headerGradients[currentColor];
  } else {
    hdr.style.background = '#0d1f3c';
  }
}

function openChecklist(key, color) {
  currentChecklist = key;
  currentColor = color;
  const steps = checklists[key].steps;

  if (!checked[key] || checked[key].length !== steps.length) {
    checked[key] = new Array(steps.length).fill(false);
  }
  if (!assigned[key] || assigned[key].length !== steps.length) {
    assigned[key] = new Array(steps.length).fill('');
  }

  showScreen('screen-checklist');
  document.getElementById('cl-title').textContent = checklists[key].he;

  const totalSteps = steps.filter(s=>s.type === 'step').length;
  document.getElementById('cl-sub').textContent = `${totalSteps} צעדים`;

  applyHeaderColor();
  initCrewInputs();
  initCaptainButton();
  renderSteps();
  saveState();
}

function goHome() {
  currentChecklist = null;
  currentColor = null;
  showScreen('screen-home');
  saveState();
}

/* CREW */
function toggleCrew() {
  const body = document.getElementById('crew-body');
  const ind = document.getElementById('crew-toggle-indicator');
  body.classList.toggle('show');
  ind.textContent = body.classList.contains('show') ? '▲' : '▼';
}

function initCrewInputs() {
  document.querySelectorAll('[data-crew]').forEach(inp=>{
    const letter = inp.dataset.crew;
    inp.value = crew[letter] || '';
    inp.oninput = ()=>{
      crew[letter] = inp.value;
      saveState();
      updateAssignmentsHighlight();
    };
  });
}

/* CAPTAIN BUTTON */
function initCaptainButton() {
  const btn = document.getElementById('captain-btn');
  if (!btn) return;

  updateCaptainButtonVisual();

  let pressTimer = null;

  const startPress = () => {
    if (pressTimer) clearTimeout(pressTimer);
    pressTimer = setTimeout(()=>{
      captainMode = !captainMode;
      updateCaptainButtonVisual();
      saveState();
      if (currentChecklist) renderSteps();
    }, 1500);
  };

  const cancelPress = () => {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
    }
  };

  btn.onmousedown = startPress;
  btn.onmouseup = cancelPress;
  btn.onmouseleave = cancelPress;
  btn.ontouchstart = (e)=>{ e.preventDefault(); startPress(); };
  btn.ontouchend = cancelPress;
}

function updateCaptainButtonVisual() {
  const btn = document.getElementById('captain-btn');
  if (!btn) return;
  if (captainMode) {
    btn.classList.add('captain-active');
  } else {
    btn.classList.remove('captain-active');
  }
}

/* CLEAR ASSIGNMENTS (ציוות) */
function clearCrew() {
  if (!currentChecklist) return;
  if (!confirm('למחוק את הציוות הנוכחי?')) return;

  const steps = checklists[currentChecklist].steps;
  assigned[currentChecklist] = new Array(steps.length).fill('');
  saveState();
  renderSteps();
}

/* AUTO ASSIGN CREW */
function autoAssignCrew() {
  if (!currentChecklist) return;
  const cfg = checklists[currentChecklist];
  const steps = cfg.steps;
  const def = cfg.defaultAssignSteps;

  if (!def || !def.length) {
    alert('אין ציוות מוגדר לצ\'קליסט זה בקוד.');
    return;
  }

  if (!assigned[currentChecklist] || assigned[currentChecklist].length !== steps.length) {
    assigned[currentChecklist] = new Array(steps.length).fill('');
  }

  let stepIdx = 0;
  steps.forEach((s, i)=>{
    if (s.type === 'step' && stepIdx < def.length) {
      assigned[currentChecklist][i] = def[stepIdx] || '';
      stepIdx++;
    }
  });

  saveState();
  renderSteps();
}

/* RENDER STEPS */
function renderSteps() {
  const list = document.getElementById('steps-list');
  list.innerHTML = '';
  const steps = checklists[currentChecklist].steps;
  const state = checked[currentChecklist];
  const assigns = assigned[currentChecklist] || [];

  let visibleStepNumber = 1;

  steps.forEach((step, i)=>{
    if (step.type === 'captain') {
      if (!captainMode) return;
      const div = document.createElement('div');
      div.className = 'captain-banner';
      div.innerHTML = step.text;
      list.appendChild(div);
      return;
    }

    if (step.type === 'separator') {
      const sep = document.createElement('div');
      sep.className = 'separator-line';
      list.appendChild(sep);
      return;
    }

    if (step.type === 'step') {
      const div = document.createElement('div');
      const isChecked = !!state[i];
      const assignVal = (assigns[i] || '').toUpperCase();

      div.className = 'step-item' + (isChecked ? ' checked' : '');
      div.dataset.index = i;

      div.innerHTML = `
        <div class="step-checkbox">${isChecked ? '✓' : ''}</div>
        <div class="step-number">${visibleStepNumber}</div>
        <div class="step-text">${step.text}</div>
        <div class="assign-wrap" onclick="event.stopPropagation()">
          <input class="assign-input" maxlength="4" data-assign-index="${i}" value="${assignVal}">
        </div>
      `;

      div.addEventListener('click', ()=>toggleStep(i));
      list.appendChild(div);

      visibleStepNumber++;
    }
  });

  list.querySelectorAll('.assign-input').forEach(inp=>{
    inp.oninput = ()=>{
      const idx = parseInt(inp.dataset.assignIndex,10);
      let val = (inp.value || '').toUpperCase().replace(/[^A-F]/g,'');
      if (val.length>4) val = val.slice(0,4);
      inp.value = val;
      if (!assigned[currentChecklist]) {
        assigned[currentChecklist] = new Array(steps.length).fill('');
      }
      assigned[currentChecklist][idx] = val;
      saveState();
      updateAssignmentsHighlight();
    };
  });

  updateProgress();
  updateAssignmentsHighlight();
}

/* TOGGLE STEP */
function toggleStep(i) {
  checked[currentChecklist][i] = !checked[currentChecklist][i];
  renderSteps();
  saveState();

  if (checked[currentChecklist][i]) {
    const list = document.getElementById('steps-list');
    const item = list.querySelector(`.step-item[data-index="${i}"]`);
    if (item) {
      const rect = item.getBoundingClientRect();
      window.scrollBy({ top: rect.bottom - 80, behavior: 'smooth' });
    }
  }
}

/* PROGRESS */
function updateProgress() {
  const steps = checklists[currentChecklist].steps;
  const state = checked[currentChecklist];

  let done = 0;
  let total = 0;

  steps.forEach((step, idx)=>{
    if (step.type === 'step') {
      total++;
      if (state && state[idx]) done++;
    }
  });

  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total}`;
  const badge = document.getElementById('complete-badge');
  if (done===total && total>0) badge.classList.add('show');
  else badge.classList.remove('show');
}

/* ASSIGNMENT HIGHLIGHT */
function updateAssignmentsHighlight() {
  if (!currentChecklist) return;
  const activeLetters = Object.entries(crew)
    .filter(([,name])=>name && name.trim().length>0)
    .map(([letter])=>letter);

  const list = document.getElementById('steps-list');
  const assigns = assigned[currentChecklist] || [];

  list.querySelectorAll('.step-item').forEach(item=>{
    const idx = parseInt(item.dataset.index,10);
    const val = (assigns[idx]||'').toUpperCase();
    const hasMatch = activeLetters.some(letter=>val.includes(letter));
    item.classList.toggle('assigned-highlight', hasMatch);
  });
}

/* RESET */
function resetAll() {
  if (!confirm('לאפס את כל הנתונים?')) return;
  currentChecklist = null;
  currentColor = null;
  checked = {};
  assigned = {};
  crew = {A:'',B:'',C:'',D:'',E:'',F:'',G:'',H:''};
  captainMode = false;
  saveState();
  document.querySelectorAll('[data-crew]').forEach(inp=>inp.value='');
  showScreen('screen-home');
}

/* INIT */
loadState();
</script>
